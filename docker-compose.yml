services: 

  redis: 
    image: redis:7-alpine
    container_name: chaos-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  go-api:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    container_name: chaos-api
    depends_on:
      - redis
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis:6379
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
  
  nginx:
    image: nginx:alpine
    container_name: chaos-nginx
    restart: unless-stopped
    ports:
    - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - go-api